name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 🔥 Inject version from Git tag (no "v" prefix required)
      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME}"
          echo "__version__ = \"${VERSION}\"" > src/hungerlib/_version.py
          echo "Using version: ${VERSION}"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
