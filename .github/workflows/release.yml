name: Versioned Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read VERSION file
        id: version
        run: |
          VERSION_CONTENT=$(cat VERSION | tr -d ' \t\n\r')
          echo "VERSION=$VERSION_CONTENT" >> $GITHUB_ENV

          if [ -z "$VERSION_CONTENT" ] || [ "$VERSION_CONTENT" = "NUL" ]; then
            echo "SKIP_RELEASE=true" >> $GITHUB_ENV
          else
            echo "SKIP_RELEASE=false" >> $GITHUB_ENV
          fi

      - name: Stop if release is skipped
        if: env.SKIP_RELEASE == 'true'
        run: echo "Skipping release because VERSION is empty or NUL."

      - name: Set up Python
        if: env.SKIP_RELEASE == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build tools
        if: env.SKIP_RELEASE == 'false'
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        if: env.SKIP_RELEASE == 'false'
        run: python -m build

      - name: Create GitHub Release
        if: env.SKIP_RELEASE == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          files: |
            dist/*.whl
            dist/*.tar.gz

      - name: Publish to PyPI
        if: env.SKIP_RELEASE == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
