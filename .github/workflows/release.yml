name: Versioned Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install tomli tomli_w build
          sudo snap install yq || true

      - name: Parse version.yaml
        id: version
        run: |
          RUN=$(yq '.run' version.yaml)
          VERSION=$(yq '.version' version.yaml)
          DESC=$(yq '.description' version.yaml)

          echo "RUN=$RUN" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          echo "DESC<<EOF" >> $GITHUB_ENV
          echo "$DESC" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Stop if run=false
        if: env.RUN == 'false'
        run: echo "run=false → skipping release."

      - name: Inject version into pyproject.toml
        if: env.RUN == 'true'
        run: |
          cat > inject_version.py << 'EOF'
import tomli, tomli_w

with open("pyproject.toml", "rb") as f:
    data = tomli.load(f)

data["project"]["version"] = "${VERSION}"

with open("pyproject.toml", "wb") as f:
    f.write(tomli_w.dumps(data).encode())
EOF
          python inject_version.py

      - name: Set up Python 3.11
        if: env.RUN == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package
        if: env.RUN == 'true'
        run: |
          rm -rf dist
          python -m build

      - name: Create GitHub Release
        if: env.RUN == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          body: ${{ env.DESC }}
          files: |
            dist/*.whl
            dist/*.tar.gz

      - name: Publish to PyPI
        if: env.RUN == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
