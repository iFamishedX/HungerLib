name: Versioned Release

on:
  push:
    branches:
      - main
      - dev

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, 'Merge pull request') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yq (fast)
        run: |
          curl -sL https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 \
            -o /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Parse version.yaml
        id: version
        run: |
          echo "RUN=$(yq '.run' version.yaml)" >> $GITHUB_ENV
          echo "YAML_VERSION=$(yq '.version' version.yaml)" >> $GITHUB_ENV
          echo "DESC<<EOF" >> $GITHUB_ENV
          yq '.description' version.yaml >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Get last published version
        id: last
        run: |
          LAST=$(gh release list --limit 1 --json tagName -q '.[0].tagName')
          echo "LAST_VERSION=$LAST" >> $GITHUB_ENV

      - name: Compute next version
        id: bump
        run: |
          python3 << 'EOF'
          import os, re, sys

          L = os.environ["LAST_VERSION"]
          S = os.environ["YAML_VERSION"]

          def parse(v):
              m = re.match(r"^(\d+)\.(\d+)(?:\.(\d+))?(?:\.(\w+)(\d+)?)?$", v)
              if not m:
                  sys.exit(f"Invalid version: {v}")
              major, minor, patch, channel, cnum = m.groups()
              return (
                  int(major),
                  int(minor),
                  int(patch) if patch else 0,
                  channel,
                  int(cnum) if cnum else None
              )

          Lmaj, Lmin, Lpatch, Lchan, Lcnum = parse(L)
          Smaj, Smin, Spatch, Schan, Scnum = parse(S)

          # Determine which line wins
          if (Smaj, Smin) > (Lmaj, Lmin):
              Nmaj, Nmin = Smaj, Smin
          else:
              Nmaj, Nmin = Lmaj, Lmin

          # CHANNEL MISMATCH CHECK
          if Lchan != Schan:
              if (Lchan or Schan):
                  with open(os.environ["GITHUB_ENV"], "a") as f:
                      f.write("CHANNEL_MISMATCH=true\n")
                  sys.exit(0)

          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write("CHANNEL_MISMATCH=false\n")

          # CASE 1: No channel
          if Lchan is None and Schan is None:
              if (Smaj, Smin) > (Lmaj, Lmin):
                  new = f"{Smaj}.{Smin}"
              else:
                  if (Smaj, Smin, Spatch) <= (Lmaj, Lmin, Lpatch):
                      new = f"{Nmaj}.{Nmin}.{Lpatch+1}"
                  else:
                      new = f"{Nmaj}.{Nmin}.{Spatch}"

          # CASE 2: Channel exists (and matches)
          else:
              if Lchan is None and Schan is not None:
                  if Scnum is None:
                      new = f"{Nmaj}.{Nmin}.{Lpatch}.{Schan}1"
                  else:
                      new = f"{Nmaj}.{Nmin}.{Lpatch}.{Schan}{Scnum}"
              else:
                  if Schan is None:
                      new = f"{Nmaj}.{Nmin}.{Lpatch}.{Lchan}{(Lcnum or 0)+1}"
                  else:
                      if Scnum is None:
                          new = f"{Nmaj}.{Nmin}.{Lpatch}.{Lchan}{(Lcnum or 0)+1}"
                      else:
                          if Scnum <= (Lcnum or 0):
                              new = f"{Nmaj}.{Nmin}.{Lpatch}.{Lchan}{(Lcnum or 0)+1}"
                          else:
                              new = f"{Nmaj}.{Nmin}.{Lpatch}.{Lchan}{Scnum}"

          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"NEXT_VERSION={new}\n")
          EOF

      - name: Stop if run=false
        if: ${{ env.RUN == 'false' }}
        run: echo "run=false → skipping release."

      - name: Stop on channel mismatch
        if: ${{ env.CHANNEL_MISMATCH == 'true' }}
        run: echo "Channel mismatch → cancelling build."

      - name: Set up Python 3.11
        if: ${{ env.RUN == 'true' && env.CHANNEL_MISMATCH == 'false' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python deps
        if: ${{ env.RUN == 'true' && env.CHANNEL_MISMATCH == 'false' }}
        run: |
          python -m pip install --upgrade pip
          pip install --no-deps tomli tomli_w build

      - name: Inject version into pyproject.toml
        if: ${{ env.RUN == 'true' && env.CHANNEL_MISMATCH == 'false' }}
        run: |
          python - << 'EOF'
          import tomli, tomli_w
          d = tomli.load(open('pyproject.toml','rb'))
          d['project']['version'] = '${NEXT_VERSION}'
          open('pyproject.toml','wb').write(tomli_w.dumps(d).encode())
          EOF

      - name: Build package
        if: ${{ env.RUN == 'true' && env.CHANNEL_MISMATCH == 'false' }}
        run: |
          rm -rf dist
          python -m build

      - name: Create GitHub Release
        if: ${{ env.RUN == 'true' && env.CHANNEL_MISMATCH == 'false' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.NEXT_VERSION }}
          name: ${{ env.NEXT_VERSION }}
          body: ${{ env.DESC }}
          files: |
            dist/*.whl
            dist/*.tar.gz

      - name: Publish to PyPI
        if: ${{ env.RUN == 'true' && env.CHANNEL_MISMATCH == 'false' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
